apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: raidarrays.rmdadm.io
spec:
  group: rmdadm.io
  scope: Namespaced
  names:
    plural: raidarrays
    singular: raidarray
    kind: RaidArray
    shortNames:
    - rda
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: ["device", "level", "raidDevices", "components"]
            properties:
              device:
                type: string
                example: /dev/md0
              level:
                type: integer
                minimum: 0
              raidDevices:
                type: integer
                minimum: 1
              metadata:
                type: string
                default: "1.2"
              chunkSizeKiB:
                type: integer
                minimum: 4
                maximum: 32768
              components:
                type: array
                items:
                  type: string
          status:
            type: object
            properties:
              state:
                type: string
              health:
                type: string
              message:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Device
      type: string
      jsonPath: .spec.device
    - name: Level
      type: integer
      jsonPath: .spec.level
    - name: State
      type: string
      jsonPath: .status.state
